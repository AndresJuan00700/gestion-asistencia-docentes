<div class="container d-flex align-items-center justify-content-center">
  <div class="login-box">
    <img src="../../assets/logo-secretaria.png" alt="Logo" class="login-logo">
    <h4 class="text-center">Iniciar Sesión</h4>
    <div class="form-group">
      <input type="email" class="form-control mb-3" placeholder="Email" [(ngModel)]="email" name="email">
    </div>
    <div class="form-group">
      <input class="form-control mb-3" type="password" placeholder="Contraseña" [(ngModel)]="password" name="password">
    </div>
    <button (click)="goToMain()" class="btn btn-primary w-100" name="btn">Login</button>
  </div>
</div>
