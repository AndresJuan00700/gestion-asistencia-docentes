<h4>Registro de Novedad</h4>
<form class="row">

  <input type="text" class="form-control mb-2" placeholder="Docente">

  <select class="form-control mb-2">
    <option selected disabled>Novedad</option>
    <option value="incapacidad">Incapacidad</option>
    <option value="licencia">Licencia</option>
    <option value="comision">Comisión</option>
    <option value="permiso">Permiso</option>
    <option value="renuncia">Renuncia</option>
    <option value="retiro">Retiro</option>
  </select>

  <textarea class="form-control mb-2" placeholder="Observaciones"></textarea>

  <div class="form-check mb-2">
    <input class="form-check-input" type="checkbox" id="aprobadoCoordinador">
    <label class="form-check-label" for="aprobadoCoordinador">
      Aprobado Coordinador
    </label>
  </div>

  <div class="form-check mb-2">
    <input class="form-check-input" type="checkbox" id="aprobadoRector">
    <label class="form-check-label" for="aprobadoRector">
      Aprobado Rector
    </label>
  </div>

  <button type="submit" class="btn btn-primary">
    Enviar
  </button>

</form>
