<h1 class="text-center mb-4">Registro de asistencia</h1>
<form class="row g-3">
  <div class="col-12">
    <input type="text" id="docente" class="form-control mb-3" placeholder="Docente">
  </div>
  <div class="col-md-6">
    <label for="horaInicio" class="form-label">Hora de inicio</label>
    <input type="time" id="horaInicio" class="form-control mb-3">
  </div>
  <div class="col-md-6">
    <label for="horaFin" class="form-label">Hora de finalización</label>
    <input type="time" id="horaFin" class="form-control mb-3">
  </div>
  <div class="col-md-6 form-check">
    <input class="form-check-input" type="checkbox" id="aprobadoCoordinador">
    <label class="form-check-label" for="aprobadoCoordinador">Aprobado Coordinador</label>
  </div>
  <div class="col-md-6 form-check">
    <input class="form-check-input" type="checkbox" id="aprobadoRector">
    <label class="form-check-label" for="aprobadoRector">Aprobado Rector</label>
  </div>
  <div class="col-12 d-flex justify-content-between">
    <button type="submit" class="btn btn-primary btn-lg">Enviar</button>
    <button routerLink="../" class="btn btn-secondary btn-lg">Volver</button>
  </div>
</form>
